name: CI Blog Project

on:
  push:
    branches:
      - main
jobs:
  build-deploy:
    name: Build and deploy Spring Blog
    runs-on: ubuntu-latest
    env:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/postgres
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${{ secrets.SPRING_DATASOURCE_PASSWORD }}

      CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
      CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
      CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ secrets.SPRING_DATASOURCE_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5 

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: 21

      - name: Install Postgres Client CLI
        run: sudo apt-get install -y postgresql-client
      - name: Create Schema Article
        env:
          PGPASSWORD: ${{ secrets.SPRING_DATASOURCE_PASSWORD }}
        run: |
          psql -h localhost -U postgres -d postgres -c "CREATE SCHEMA IF NOT EXISTS articles;"
      - name: Compile Project
        run: mvn clean compile
      - name: test
        run: mvn test
      - name: Run SonarQube Analysis
        env:
          SONAR_TOKEN: ${{secrets.SONAR_TOKEN}}
        run: mvn sonar:sonar \
          -Dsonar.projectKey=Ibrahim567bergou_spring-boot-blog-api \
          -Dsonar.organization=ibrahim567bergou \
          -Dsonar.host.url=https://sonarcloud.io \
          -Dsonar.login=$SONAR_TOKEN \
          -Dsonar.qualitygate.wait=true
      - name: Create file Jar
        run: mvn package

